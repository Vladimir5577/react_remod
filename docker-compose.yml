services:
  frontend:
    image: node:20-alpine
    container_name: react_app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - app-net

volumes:
  frontend_node_modules:

networks:
  app-net:
    external: true
    name: app-net